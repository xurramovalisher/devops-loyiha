name: Python Test CI

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Test kutubxonasini o'rnatish
        run: pip install pytest

      - name: Testlarni ishga tushirish
        run: pytest
