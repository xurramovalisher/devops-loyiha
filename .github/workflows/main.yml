name: Mening Birinchi CI

on:
  push:
    branches:
      - main

jobs:
  run-python:
    runs-on: ubuntu-latest

    steps:
      - name: Kodni yuklab olish
        uses: actions/checkout@v4

      - name: Pythonni sozlash
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Kodni ishga tushirish
        run: python app.py
